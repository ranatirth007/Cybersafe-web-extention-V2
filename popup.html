<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CyberSafe Web Guard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center;">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="shield-icon"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <h2>CyberSafe</h2>
      </div>
      <button id="openSettingsBtn" title="Settings" style="background:none; border:none; color:var(--text-muted, #94a3b8); cursor:pointer; padding:5px;">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>

    <div class="panel top-panel">
      <div class="site-info">
        <div class="label">Target Website</div>
        <div id="url" class="url-text" title="Not scanned">Not scanned</div>
      </div>
    </div>

    <!-- Radar Animation -->
    <div id="radarContainer" class="hidden">
      <div class="radar">
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-sweep"></div>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="panel result-panel hidden">
      <div class="score-container">
        <div class="score-circle" id="scoreCircle">
          <span id="score">0</span>
          <span class="score-label">/100</span>
        </div>
      </div>
      <div class="status-box">
        <div class="label">Status Assessment</div>
        <div id="status" class="status-msg">Waiting for scan</div>
      </div>
    </div>

    <!-- Scan Button -->
    <button id="scanBtn" class="primary-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      Scan Website
    </button>

    <!-- Website Scan Report -->
    <div id="report" class="panel report-panel hidden">
      <h3>Scan Report</h3>
      <div class="report-grid">
        <div class="stat-item">
          <span class="stat-value" id="links">0</span>
          <span class="stat-label">Links</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="scripts">0</span>
          <span class="stat-label">Scripts</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="forms">0</span>
          <span class="stat-label">Forms</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="iframes">0</span>
          <span class="stat-label">Iframes</span>
        </div>
        <div class="stat-item hidden" id="keywordBox">
          <span class="stat-value" id="keywords">0</span>
          <span class="stat-label">Risk Words</span>
        </div>
      </div>
      
      <div id="breakdownContainer" class="breakdown-container hidden">
        <h4>Risk Breakdown</h4>
        <ul id="reasonsList" class="reasons-list"></ul>
      </div>

      <div id="phishingWordsContainer" class="breakdown-container hidden" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
        <h4 style="color: var(--danger); display: flex; align-items: center; gap: 8px;">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Detected Malicious Keywords
        </h4>
        <ul id="phishingWordsList" class="reasons-list" style="margin-top: 10px;"></ul>
      </div>
    </div>
    
    <!-- Details Modal -->
    <div id="detailsModal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Details</h3>
          <button id="closeModal" class="close-btn">&times;</button>
        </div>
        <ul id="modalList" class="modal-list"></ul>
      </div>
    </div>

    <!-- AI Advisor Modal -->
    <div id="aiModal" class="modal-overlay hidden">
      <div class="modal-content ai-modal">
        <div class="modal-header ai-header">
          <h3 id="aiModalTitle">✨ Security Advisor</h3>
          <button id="closeAiModal" class="close-btn">&times;</button>
        </div>
        <div id="aiModalBody" class="ai-modal-body">
          <div id="aiLoadingIndicator" class="ai-loader">
             <div class="spinner"></div>
             <span>Analyzing Vulnerability...</span>
          </div>
          <div id="aiResponseText" class="ai-text hidden"></div>
        </div>
      </div>
    </div>

    <div class="watermark">- by Rana Tirth</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
